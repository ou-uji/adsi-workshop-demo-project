spring:
  docker:
    compose:
      enabled: false

  datasource:
    url: jdbc:h2:mem:attendance;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

app:
  cors:
    # SageMaker Studio Code Editor のプレビュー（https://<studio-domain>）からも
    # アクセスするため、Studio ドメインのパターンを許可する。CorsConfig 側は
    # allowedOriginPatterns を使うので "*" でサブドメインを吸収できる。
    allowed-origins: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,https://*.studio.*.sagemaker.aws

logging:
  level:
    com.example.attendance: DEBUG
