# JDK フォント設定（ヘッドレス環境向け）
#
# 背景: SageMaker / 一部のコンテナ環境では /etc/fonts/fonts.conf 本体が欠落しており、
# Temurin JDK も lib/fontconfig.properties を同梱しないため、AWT のフォント初期化が
# 「Fontconfig head is null」で失敗する。JasperReports の PDF 生成はこの初期化を通るため
# PDF エクスポートだけが 500 になる。
#
# このファイルを -Dsun.awt.fontconfig で明示指定することで、/etc に触れずに初期化を通す。
# JVM がフォントを見つけられれば十分なので最小構成とする。
version=1
sequence.allfonts=default
